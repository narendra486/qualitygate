name: QualityGate Examples

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: QualityGate CodeQL example
        uses: ./
        with:
          sarif_file: examples/sarif/codeql.sarif
          severity_threshold: high
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_comment: true
          enable_annotations: true
          enable_step_summary: true

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: QualityGate Trivy example
        uses: ./
        with:
          sarif_file: examples/sarif/trivy.sarif
          severity_threshold: high
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_comment: true

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: QualityGate Semgrep example
        uses: ./
        with:
          sarif_file: examples/sarif
          severity_threshold: medium
          ignore_paths: "**/test/**,**/fixtures/**"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_comment: false

  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: QualityGate Snyk example
        uses: ./
        with:
          sarif_file: examples/sarif
          severity_threshold: high
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_comment: false

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: QualityGate Checkov example
        uses: ./
        with:
          sarif_file: examples/sarif
          severity_threshold: medium
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_comment: false

  multi-scanner-aggregation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: QualityGate multi-scanner aggregation
        uses: ./
        with:
          sarif_file: |
            examples/sarif/codeql.sarif
            examples/sarif/trivy.sarif
          severity_threshold: high
          fail_on_count: 20
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_comment: true
          enable_annotations: true
          enable_step_summary: true
          json_export_file: qualitygate-report.json

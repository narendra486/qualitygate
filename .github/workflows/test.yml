name: Test Action

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package action
        run: npm run package

      - name: Run QualityGate against examples
        uses: ./
        continue-on-error: true
        id: qualitygate
        with:
          sarif_file: examples/sarif
          baseline_file: examples/baselines/baseline.sarif
          severity_threshold: high
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_comment: false
          enable_annotations: true
          enable_step_summary: true
          json_export_file: qualitygate-report.json

      - name: Assert outputs
        run: |
          test -n "${{ steps.qualitygate.outputs.total_findings }}"
          test -n "${{ steps.qualitygate.outputs.processed_files }}"

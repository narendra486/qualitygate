name: 'QualityGate - Universal SARIF Security Quality Gate'
description: 'Enterprise-grade GitHub Action for SARIF-based security quality gates supporting CodeQL, Snyk, Trivy, Semgrep, Checkov, Grype, and other scanners.'
author: 'QualityGate maintainers'
inputs:
  sarif_file:
    description: 'SARIF path input: single file, multiline file list, directory, or glob.'
    required: true
  severity_threshold:
    description: 'Severity threshold (low|medium|high|critical)'
    required: true
    default: 'high'
  mode:
    description: 'Enforcement mode: block fails the workflow with exit 1; report posts results without failing.'
    required: false
    default: 'block'
  github_token:
    description: 'GitHub token for PR comments and optional check runs.'
    required: false
  pr_comment:
    description: 'Whether to post PR comments (true/false)'
    required: false
    default: 'true'
  fail_on_count:
    description: 'Optional: Fail if total findings exceed this number'
    required: false
  ignore_rule_ids:
    description: 'Comma-separated list of rule IDs to ignore'
    required: false
  ignore_paths:
    description: 'Comma-separated glob patterns for paths to ignore'
    required: false
  deduplicate:
    description: 'Whether to deduplicate findings (true/false)'
    required: false
    default: 'true'
  enable_annotations:
    description: 'Whether to create GitHub workflow annotations.'
    required: false
    default: 'true'
  enable_step_summary:
    description: 'Whether to write the GitHub Step Summary.'
    required: false
    default: 'true'
  markdown_template:
    description: 'Optional custom markdown template path using {{status}}, {{summary_table}}, {{findings_table}}, and related tokens.'
    required: false
  max_findings_display:
    description: 'Maximum findings displayed in PR comments and step summaries.'
    required: false
    default: '100'
  json_export_file:
    description: 'Optional path to write a JSON report artifact.'
    required: false
outputs:
  total_findings:
    description: 'Total number of findings'
  critical_count:
    description: 'Number of critical findings'
  high_count:
    description: 'Number of high findings'
  medium_count:
    description: 'Number of medium findings'
  low_count:
    description: 'Number of low findings'
  quality_gate_status:
    description: 'PASS or FAIL'
  blocked:
    description: 'true when the quality gate failed'
  processed_files:
    description: 'Newline-separated list of processed SARIF files'
runs:
  using: 'node24'
  main: 'dist/index.js'
branding:
  icon: 'shield'
  color: 'red'
